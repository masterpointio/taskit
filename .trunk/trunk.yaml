version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - actionlint@1.7.12
    - checkov@3.2.513
    - trivy@0.69.3
    - yamllint@1.38.0
    - git-diff-check
    - markdownlint@0.48.0
    - prettier@3.8.1
    - trufflehog@3.94.1
  ignore:
    - linters: [ALL]
      paths:
        - CHANGELOG.md
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
actions:
  disabled:
    - trunk-check-pre-push
  enabled:
    - trunk-announce
    - trunk-check-pre-push-always
    - trunk-fmt-pre-commit
    - commitlint
    - trunk-upgrade-available
